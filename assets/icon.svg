<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128">
  <!-- Window outline -->
  <rect x="10" y="18" width="108" height="96" rx="10" fill="none" stroke="#3A9AD2" stroke-width="6"/>

  <!-- Title bar separator -->
  <line x1="10" y1="44" x2="118" y2="44" stroke="#3A9AD2" stroke-width="6"/>

  <!-- Window control dots -->
  <circle cx="28" cy="31" r="5" fill="#3A9AD2"/>
  <circle cx="46" cy="31" r="5" fill="#3A9AD2"/>
  <circle cx="64" cy="31" r="5" fill="#3A9AD2"/>

  <!-- Git branch lines (drawn first so nodes sit on top) -->
  <line x1="34" y1="60" x2="64" y2="79" stroke="#3A9AD2" stroke-width="5.5" stroke-linecap="round"/>
  <line x1="94" y1="60" x2="64" y2="79" stroke="#3A9AD2" stroke-width="5.5" stroke-linecap="round"/>
  <line x1="64" y1="79" x2="64" y2="98" stroke="#3A9AD2" stroke-width="5.5" stroke-linecap="round"/>

  <!-- Git branch nodes -->
  <circle cx="34" cy="60" r="7" fill="#3A9AD2"/>
  <circle cx="94" cy="60" r="7" fill="#3A9AD2"/>
  <circle cx="64" cy="79" r="7" fill="#3A9AD2"/>
  <circle cx="64" cy="98" r="7" fill="#3A9AD2"/>
</svg>
